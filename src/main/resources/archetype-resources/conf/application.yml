#set( $dollar = '$' )
spring:
  application:
    name: ${rootArtifactId}
  jackson:
    time-zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    clean-disabled: true
    baseline-on-migrate: false
  sql:
    init:
      mode: never

atom:
  api:
    version: ${version}
  security:
    password:
      # BCrypt is the replaceable baseline adapter; tune only after measuring authentication capacity.
      bcrypt-strength: 12
    trusted-header:
      enabled: false
      authorities: ""
  redis:
    enabled: false

management:
  health:
    # Do not create a failing Redis health dependency while the optional adapter is disabled.
    redis:
      enabled: ${dollar}{atom.redis.enabled:false}
  endpoints:
    web:
      exposure:
        include: health
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
    tags:
      application: ${rootArtifactId}
  prometheus:
    metrics:
      export:
        enabled: false
