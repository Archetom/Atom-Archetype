#set( $dollar = '$' )
server:
  # Keep the development-only trusted-header adapter off the network by default.
  address: ${dollar}{SERVER_ADDRESS:127.0.0.1}

spring:
  application:
    name: ${rootArtifactId}
  datasource:
    url: jdbc:mysql://localhost:3306/atom_db?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
    username: atom_user
    password: atom_pass
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
# logging configuration
logging:
  config: classpath:logback-spring.xml
  level:
    root: info
  file:
    path: ./logs/app

# mybatis-plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    call-setters-on-nulls: true
    jdbc-type-for-null: 'null'
  mapper-locations: classpath*:mapper/**/*.xml

# thread pool configuration
task:
  executor:
    core-pool-size: 5
    max-pool-size: 10
    queue-capacity: 100
    keep-alive-seconds: 60
    thread-name-prefix: ${rootArtifactId}-task-

# Trusted headers are for explicit local development only.
atom:
  security:
    trusted-header:
      enabled: ${dollar}{ATOM_SECURITY_TRUSTED_HEADER_ENABLED:false}
      authorities: "users:read,users:write,users:delete"
  redis:
    enabled: ${dollar}{ATOM_REDIS_ENABLED:false}
