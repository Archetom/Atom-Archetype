#set( $dollar = '$' )
######################## production environment ####################
spring:
  application:
    name: ${rootArtifactId}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${dollar}{SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/${rootArtifactId}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${dollar}{SPRING_DATASOURCE_USERNAME:root}
    password: ${dollar}{SPRING_DATASOURCE_PASSWORD:}

# logging configuration
logging:
  config: classpath:logback-spring.xml
  level:
    root: info
  file:
    path: ./logs/app

# mybatis-plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    call-setters-on-nulls: true
    jdbc-type-for-null: 'null'
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deletedTime
      logic-delete-value: now()
      logic-not-delete-value: 'null'
  mapper-locations: classpath*:mapper/**/*.xml

# thread pool configuration
task:
  executor:
    core-pool-size: 5
    max-pool-size: 10
    queue-capacity: 100
    keep-alive-seconds: 60
    thread-name-prefix: ${artifactId}-task-
