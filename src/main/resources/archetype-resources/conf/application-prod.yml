#set( $dollar = '$' )
######################## production environment ####################
spring:
  application:
    name: ${rootArtifactId}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${dollar}{SPRING_DATASOURCE_URL}
    username: ${dollar}{SPRING_DATASOURCE_USERNAME}
    password: ${dollar}{SPRING_DATASOURCE_PASSWORD}

# API documentation is opt-in in production.
springdoc:
  api-docs:
    enabled: ${dollar}{SPRINGDOC_API_DOCS_ENABLED:false}
  swagger-ui:
    enabled: ${dollar}{SPRINGDOC_SWAGGER_UI_ENABLED:false}

# Production never trusts caller-controlled identity headers.
atom:
  security:
    trusted-header:
      enabled: false
      authorities: ""
  redis:
    enabled: ${dollar}{ATOM_REDIS_ENABLED:false}

# logging configuration
logging:
  config: classpath:logback-spring.xml
  level:
    root: info
  file:
    path: ./logs/app

# mybatis-plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    call-setters-on-nulls: true
    jdbc-type-for-null: 'null'
  mapper-locations: classpath*:mapper/**/*.xml

# thread pool configuration
task:
  executor:
    core-pool-size: 5
    max-pool-size: 10
    queue-capacity: 100
    keep-alive-seconds: 60
    thread-name-prefix: ${artifactId}-task-
