spring:
  application:
    name: ${artifactId}-test
  
  # test data source configuration (by Testcontainers dynamic configuration)
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # url, username, password by Testcontainers dynamic configuration
    
  # test Redis configuration (by Testcontainers dynamic configuration)
  data:
    redis:
      # host, port by Testcontainers dynamic configuration
      password: 
      database: 0
      timeout: 5000ms

# MyBatis Plus configuration
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    call-setters-on-nulls: true
    jdbc-type-for-null: 'null'
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deletedTime
      logic-delete-value: now()
      logic-not-delete-value: 'null'
  mapper-locations: classpath*:mapper/**/*.xml

# logging configuration
logging:
  level:
    ${package}: DEBUG
    org.springframework.web: DEBUG
    org.testcontainers: INFO
    com.github.dockerjava: WARN

# thread pool configuration
task:
  executor:
    core-pool-size: 2
    max-pool-size: 4
    queue-capacity: 50
    keep-alive-seconds: 30
    thread-name-prefix: test-task-
