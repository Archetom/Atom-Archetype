name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-archetype:
    name: Build archetype and verify generated project
    runs-on: ubuntu-24.04
    timeout-minutes: 50

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Java 25
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '25'
          check-latest: true
          cache: maven
          cache-dependency-path: |
            .mvn/wrapper/maven-wrapper.properties
            pom.xml
            src/main/resources/archetype-resources/**/pom.xml

      - name: Resolve project coordinates
        id: coordinates
        shell: bash
        run: |
          version="$(awk -F'[<>]' '/^[[:space:]]*<version>/{print $3; exit}' pom.xml)"
          artifact_id="$(awk -F'[<>]' '/^[[:space:]]*<artifactId>/{print $3; exit}' pom.xml)"
          archetype_plugin_version="$(awk -F'[<>]' '/<maven.archetype.packaging.version>/{print $3; exit}' pom.xml)"
          test -n "$version"
          test -n "$artifact_id"
          test -n "$archetype_plugin_version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "artifact_id=$artifact_id" >> "$GITHUB_OUTPUT"
          echo "archetype_plugin_version=$archetype_plugin_version" >> "$GITHUB_OUTPUT"

      - name: Verify Maven wrapper pin
        shell: bash
        run: |
          expected="$(awk -F= '/^distributionUrl=/{value=$2; sub(/^.*apache-maven-/, "", value); sub(/-bin\.zip$/, "", value); print value}' .mvn/wrapper/maven-wrapper.properties)"
          actual="$(./mvnw --version | awk '/^Apache Maven /{print $3; exit}')"
          checksum="$(awk -F= '/^distributionSha256Sum=/{print $2}' .mvn/wrapper/maven-wrapper.properties)"
          test "$actual" = "$expected"
          test "${#checksum}" -eq 64
          case "$checksum" in
            *[!0-9a-f]*) exit 1 ;;
          esac

      - name: Check repository whitespace
        run: git diff --check 4b825dc642cb6eb9a060e54bf8d69288fbee4904 HEAD -- .

      - name: Install archetype under test
        timeout-minutes: 10
        run: ./mvnw -B -ntp clean install -Dgpg.skip=true

      - name: Verify Central publication artifacts
        shell: bash
        run: |
          artifact="target/${{ steps.coordinates.outputs.artifact_id }}-${{ steps.coordinates.outputs.version }}"
          test -s "${artifact}.jar"
          test -s "${artifact}-sources.jar"
          test -s "${artifact}-javadoc.jar"
          jar tf "${artifact}-javadoc.jar" | grep -qx 'README.md'

      - name: Generate demo project
        timeout-minutes: 5
        working-directory: ${{ runner.temp }}
        run: |
          ${{ github.workspace }}/mvnw -B -ntp org.apache.maven.plugins:maven-archetype-plugin:${{ steps.coordinates.outputs.archetype_plugin_version }}:generate \
            -DarchetypeGroupId=io.github.archetom \
            -DarchetypeArtifactId=atom-archetype \
            -DarchetypeVersion=${{ steps.coordinates.outputs.version }} \
            -DgroupId=com.example.atom \
            -DartifactId=atom-demo \
            -Dpackage=com.example.atom \
            -Dversion=1.0.0-SNAPSHOT \
            -DinteractiveMode=false

      - name: Verify generated Maven wrapper
        working-directory: ${{ runner.temp }}/atom-demo
        shell: bash
        run: |
          cmp mvnw "${{ github.workspace }}/mvnw"
          cmp <(tr -d '\r' < mvnw.cmd) \
              <(tr -d '\r' < "${{ github.workspace }}/mvnw.cmd")
          cmp .mvn/wrapper/maven-wrapper.properties \
              "${{ github.workspace }}/.mvn/wrapper/maven-wrapper.properties"
          sh ./mvnw --version >/dev/null

      - name: Compile generated project
        timeout-minutes: 10
        working-directory: ${{ runner.temp }}/atom-demo
        run: sh ./mvnw -B -ntp compile

      - name: Analyze generated project dependencies
        timeout-minutes: 10
        working-directory: ${{ runner.temp }}/atom-demo
        run: sh ./mvnw -B -ntp test-compile dependency:analyze -DfailOnWarning=false

      - name: Run generated project tests without Docker
        timeout-minutes: 10
        working-directory: ${{ runner.temp }}/atom-demo
        env:
          CI: 'false'
        run: sh ./mvnw -B -ntp test

      - name: Verify Docker daemon
        run: docker info --format '{{.ServerVersion}}'

      - name: Run generated project integration tests
        timeout-minutes: 20
        working-directory: ${{ runner.temp }}/atom-demo
        env:
          CI: 'true'
        run: sh ./mvnw -B -ntp test

      - name: Verify the cleaned scaffold is idempotent and tests
        timeout-minutes: 20
        working-directory: ${{ runner.temp }}/atom-demo
        shell: bash
        run: |
          make clean-sample
          make clean-sample
          leftovers="$(find . -path '*/target' -prune -o -type f -name 'User*.java' -print)"
          if [ -n "$leftovers" ]; then
            echo "User sample files remain after clean-sample:"
            echo "$leftovers"
            exit 1
          fi
          test ! -e docs/api-reference.md
          if grep -R -n -E 'api-reference|/api/v1/users|users:(read|write|delete)' \
              README.md README.en.md AGENTS.md llms.txt infra/rest/src/main/java conf; then
            echo "User-specific runtime configuration remains after clean-sample."
            exit 1
          fi
          CI=true sh ./mvnw -B -ntp clean test
