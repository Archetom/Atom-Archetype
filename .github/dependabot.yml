version: 2

updates:
  - package-ecosystem: maven
    directory: /
    schedule:
      interval: weekly
      day: monday
      timezone: Asia/Shanghai
    groups:
      maven-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: maven
    directory: /src/main/resources/archetype-resources
    schedule:
      interval: weekly
      day: monday
      timezone: Asia/Shanghai
    groups:
      generated-maven-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      timezone: Asia/Shanghai

  - package-ecosystem: docker-compose
    directory: /src/main/resources/archetype-resources
    schedule:
      interval: weekly
      day: monday
      timezone: Asia/Shanghai
